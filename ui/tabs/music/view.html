<div class="tab-container music-tab">
    <div class="mandala-container">
        <svg id="sonic-mandala" viewBox="0 0 400 400" width="100%" height="100%">
            <circle cx="200" cy="200" r="180" fill="none" stroke="var(--glass-bg)" stroke-width="2"/>
        </svg>
        <div class="mandala-center">
            <span class="label">Current Pāda</span>
            <h1 id="active-pada">---</h1>
            <span class="label">Frequency</span>
            <h2 id="active-freq">--- Hz</h2>
            <span class="label">Rāga</span>
            <h3 id="raga-name" style="color: var(--vedic-saffron); margin: 0.2rem 0;">---</h3>
            <span class="label">Rasa</span>
            <p id="raga-rasa" style="margin: 0; font-size: 0.7rem;">---</p>
        </div>
    </div>

    <div class="music-controls">
        <div class="info-panel detail-card">
            <span class="label">Śruti Ratio</span>
            <span id="ratio-display" class="value">1/1</span>
        </div>
        <div class="info-panel detail-card">
            <span class="label">Base Frequency</span>
            <span id="base-freq-display" class="value">240 Hz (Sa)</span>
        </div>
        <div class="info-panel detail-card">
            <span class="label">Rāga Selector</span>
            <select id="raga-select">
                <option value="YAMAN">🎵 Yaman (Evening)</option>
                <option value="BHAIRAVI">🕊️ Bhairavi (Morning)</option>
                <option value="BHAIRAV">🌅 Bhairav (Sunrise)</option>
                <option value="PURE_SCALE">🌀 22 Śrutis (Pure)</option>
            </select>
        </div>
    </div>
</div>
