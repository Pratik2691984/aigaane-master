<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anumāna Engine</title>
  
  <!-- Global UI styles (if any) -->
  <link rel="stylesheet" href="/ui/styles/global.css">
  
  <!-- Local theme & layout – adjust paths to match your actual folder structure -->
  <link rel="stylesheet" href="/ui/tabs/anumana-engine/theme.css">
  <link rel="stylesheet" href="/ui/tabs/anumana-engine/layout.css">
</head>
<body>
  <!-- 
    The DOM structure required by tool.js:
    - #math      → for the 49D grid (Academic mode)
    - #action    → for the decision card
    - #insight   → for the narrative insight
  -->
  <div class="academic-tab">
    <div id="math"></div>
    <div id="action"></div>
    <div id="insight"></div>
  </div>

  <!-- 
    No script here – the TIS tool.js will:
    - Import the engine logic
    - Set up the update interval
    - Call renderMathCard / renderActionCard / renderInsightCard
  -->
</body>
</html>
